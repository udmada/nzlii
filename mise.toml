[tools]
hk = "latest"
node = "lts"
pkl = "latest"
pnpm = "latest"

[tasks.scrape]
description = "Run the NZLII scraper"
run = "node --experimental-strip-types scrape.ts"

[tasks.lint]
description = "Lint with oxlint (type-aware)"
run = "pnpm oxlint --tsconfig=tsconfig.json --type-aware ."

[tasks.typecheck]
description = "Type-check with tsc"
run = "pnpm tsc --noEmit && (ls src/*.ts src/**/*.ts 2>/dev/null | grep -q . && pnpm tsc --noEmit --project src/tsconfig.json || true)"

[tasks.fmt]
description = "Format with oxfmt"
run = "pnpm oxfmt ."

[tasks."fmt:check"]
description = "Check formatting (CI)"
run = "pnpm oxfmt --check ."

[tasks.test]
description = "Run unit tests"
run = "node --experimental-strip-types --test scrape.test.ts src/lib/parse.test.ts src/lib/kv.test.ts src/lib/r2.test.ts src/lib/d1.test.ts"

[tasks.install]
description = "Install dependencies (frozen)"
run = "pnpm install --frozen-lockfile"

[tasks."pkl:gen"]
description = "Generate GitHub Actions YAML from pkl sources"
run = "pkl eval -m .github/ --project-dir .github/pkl .github/pkl/index.pkl"

[tasks.dev]
run = "wrangler dev"

[tasks.deploy]
run = "wrangler deploy"

[tasks."db:migrate"]
run = "wrangler d1 execute nzill --file=schema.sql"

[tasks."db:migrate:local"]
run = "wrangler d1 execute nzill --local --file=schema.sql"
