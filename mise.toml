[tools]
hk = "latest"
node = "lts"
pkl = "latest"
pnpm = "latest"
wrangler = "latest"

[tasks.scrape]
description = "Run the NZLII scraper"
run = "node --experimental-strip-types scrape.ts"

[tasks.lint]
description = "Lint with oxlint (type-aware)"
run = "pnpm exec oxlint --type-aware --fix"

[tasks.typecheck]
description = "Type-check with tsc"
run = "pnpm exec oxlint --type-check --type-aware"

[tasks.fmt]
description = "Format with oxfmt"
run = "pnpm exec oxfmt"

[tasks."fmt:check"]
description = "Check formatting (CI)"
run = "pnpm exec oxfmt --check"

[tasks.test]
description = "Run unit tests"
run = "node --experimental-strip-types --test scrape.test.ts src/lib/parse.test.ts src/lib/kv.test.ts src/lib/r2.test.ts src/lib/d1.test.ts"

[tasks."test:workers"]
description = "Run Workers runtime tests with Vitest"
run = "pnpm vitest run"

[tasks.install]
description = "Install dependencies (frozen)"
run = "pnpm install --frozen-lockfile"

[tasks."pkl:gen"]
description = "Generate GitHub Actions YAML from pkl sources"
run = "pkl eval -m .github/ --project-dir .github/pkl .github/pkl/index.pkl"

[tasks.dev]
run = "pnpm exec wrangler dev"

[tasks.deploy]
run = "pnpm exec wrangler deploy"

[tasks."db:migrate"]
run = "pnpm exec wrangler d1 execute nzill --file=schema.sql"

[tasks."db:migrate:local"]
run = "pnpm exec wrangler d1 execute nzill --local --file=schema.sql"
